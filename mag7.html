<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mag7 Index · Olive Projects</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:             #08090d;
            --surface:        rgba(255,255,255,0.025);
            --text:           #eef0f3;
            --muted:          rgba(255,255,255,0.55);
            --dim:            rgba(255,255,255,0.40);
            --faint:          rgba(255,255,255,0.28);
            --ghost:          rgba(255,255,255,0.20);
            --border:         rgba(255,255,255,0.07);
            --border-sm:      rgba(255,255,255,0.06);
            --row-alt:        rgba(255,255,255,0.012);
            --row-hover:      rgba(255,255,255,0.045);
            --btn-bg:         rgba(255,255,255,0.04);
            --btn-border:     rgba(255,255,255,0.08);
            --accent:         #00a3e0;
            --hint-bg:        rgba(0,163,224,0.06);
            --hint-border:    rgba(0,163,224,0.15);
            --tooltip-bg:     #12151e;
            --tooltip-border: rgba(0,163,224,0.25);
            --tooltip-text:   rgba(255,255,255,0.60);
            --shadow:         rgba(0,0,0,0.80);
            --q-bg:           rgba(255,255,255,0.10);
            --q-border:       rgba(255,255,255,0.25);
            --q-color:        rgba(255,255,255,0.60);
            --th-dim:         rgba(255,255,255,0.15);
            --scroll-thumb:   rgba(255,255,255,0.10);
            --mode-box:       rgba(255,255,255,0.025);
        }

        [data-theme="light"] {
            --bg:             #f0f2f8;
            --surface:        rgba(0,0,0,0.03);
            --text:           #111318;
            --muted:          rgba(0,0,0,0.60);
            --dim:            rgba(0,0,0,0.48);
            --faint:          rgba(0,0,0,0.38);
            --ghost:          rgba(0,0,0,0.26);
            --border:         rgba(0,0,0,0.10);
            --border-sm:      rgba(0,0,0,0.07);
            --row-alt:        rgba(0,0,0,0.018);
            --row-hover:      rgba(0,0,0,0.04);
            --btn-bg:         rgba(0,0,0,0.04);
            --btn-border:     rgba(0,0,0,0.10);
            --accent:         #0082c8;
            --hint-bg:        rgba(0,130,200,0.07);
            --hint-border:    rgba(0,130,200,0.20);
            --tooltip-bg:     #ffffff;
            --tooltip-border: rgba(0,130,200,0.30);
            --tooltip-text:   rgba(0,0,0,0.60);
            --shadow:         rgba(0,0,0,0.12);
            --q-bg:           rgba(0,0,0,0.07);
            --q-border:       rgba(0,0,0,0.18);
            --q-color:        rgba(0,0,0,0.50);
            --th-dim:         rgba(0,0,0,0.20);
            --scroll-thumb:   rgba(0,0,0,0.15);
            --mode-box:       rgba(0,0,0,0.02);
        }

        body { background: var(--bg); }

        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            color: var(--dim); text-decoration: none;
            font-family: monospace; font-size: 12px; letter-spacing: 0.1em;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        .theme-toggle {
            position: fixed; top: 16px; right: 20px; z-index: 9999;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 5px 9px; cursor: pointer;
            font-size: 15px; line-height: 1; color: var(--dim);
            transition: all 0.2s;
        }
        .theme-toggle:hover { color: var(--text); border-color: var(--faint); }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Olive Projects</a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useRef } = React;

        const ThemeCtx = createContext("dark");

        /* Random brand-color accent — a different company "hosts" the page each visit */
        const BRAND_COLORS = ["#00a3e0","#c0c0c0","#76b900","#ff9900","#4285f4","#0082fb","#e31937"];
        const SESSION_ACCENT = BRAND_COLORS[Math.floor(Math.random() * BRAND_COLORS.length)];

        function applyAccent(hex) {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            const root = document.documentElement;
            root.style.setProperty("--accent",          hex);
            root.style.setProperty("--hint-bg",         `rgba(${r},${g},${b},0.06)`);
            root.style.setProperty("--hint-border",     `rgba(${r},${g},${b},0.15)`);
            root.style.setProperty("--tooltip-border",  `rgba(${r},${g},${b},0.28)`);
        }
        applyAccent(SESSION_ACCENT);

        function initTheme() {
            const saved = localStorage.getItem("mag7-theme");
            if (saved === "dark" || saved === "light") return saved;
            return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }

        /* Semantic indicator colors per theme */
        const C = {
            dark: {
                rank: r => r<=1?"#00e676":r<=2?"#69f0ae":r<=4?"#fff176":r<=6?"#ff8a65":"#ff5252",
                peg:  v => v<1?"#00e676":v<2?"#fff176":v<3?"#ff8a65":"#ff5252",
                rev:  v => v>20?"#00e676":v>5?"#fff176":v>=0?"#ff8a65":"#ff5252",
                rsi:  v => v>70?"#ff5252":v<30?"#00e676":v>60?"#ff8a65":"#fff176",
                beta: v => v<1?"#00e676":v<1.5?"#fff176":v<2?"#ff8a65":"#ff5252",
                cons: v => v<0.3?"#00e676":v<1?"#ffeb3b":"#ff5252",
                buy:"#00e676", hold:"#ffeb3b", sell:"#ff5252",
                pos:"#00e676", med:"#fff176",
                pillHi:   { bg:"rgba(0,230,118,0.10)", border:"rgba(0,230,118,0.25)", color:"#00e676" },
                pillMid:  { bg:"rgba(255,235,59,0.08)", border:"rgba(255,235,59,0.20)", color:"#fff176" },
                pillLow:  { bg:"rgba(255,255,255,0.05)", border:"rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.45)" },
                pillOff:  { bg:"rgba(255,255,255,0.03)", border:"rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.20)" },
            },
            light: {
                rank: r => r<=1?"#00903d":r<=2?"#007835":r<=4?"#7a6200":r<=6?"#b04400":"#c42020",
                peg:  v => v<1?"#00903d":v<2?"#7a6200":v<3?"#b04400":"#c42020",
                rev:  v => v>20?"#00903d":v>5?"#7a6200":v>=0?"#b04400":"#c42020",
                rsi:  v => v>70?"#c42020":v<30?"#00903d":v>60?"#b04400":"#7a6200",
                beta: v => v<1?"#00903d":v<1.5?"#7a6200":v<2?"#b04400":"#c42020",
                cons: v => v<0.3?"#00903d":v<1?"#7a6200":"#c42020",
                buy:"#00903d", hold:"#7a6200", sell:"#c42020",
                pos:"#00903d", med:"#7a6200",
                pillHi:   { bg:"rgba(0,160,70,0.12)",  border:"rgba(0,160,70,0.28)",  color:"#00903d" },
                pillMid:  { bg:"rgba(140,110,0,0.10)", border:"rgba(140,110,0,0.22)", color:"#7a6200" },
                pillLow:  { bg:"rgba(0,0,0,0.04)",     border:"rgba(0,0,0,0.09)",     color:"rgba(0,0,0,0.50)" },
                pillOff:  { bg:"rgba(0,0,0,0.03)",     border:"rgba(0,0,0,0.06)",     color:"rgba(0,0,0,0.30)" },
            },
        };

        const ACCENT = {
            MSFT:"#00a3e0", AAPL:"#c0c0c0", NVDA:"#76b900",
            AMZN:"#ff9900", GOOGL:"#4285f4", META:"#0082fb", TSLA:"#e31937",
        };

        const MODES = {
            lowrisk: {
                label:"Lägst risk", icon:"🛡️",
                headline:"Du prioriterar stabilitet och trygghet",
                desc:"Beta och konsensus väger tyngst. Bolag som svänger lite, har starkt analytikerstöd och bevisad lönsamhet rankas upp.",
                ignores:"Uppsida och tillväxt ignoreras – potential utan stabilitet räknas inte här.",
                weights:{ peg:1, upside:0, scoreDeviation:2, buyPct:2, roe:2, grossMargin:2, revenueGrowth:0, rsi:1, beta:3 },
            },
            value: {
                label:"Köpvärde", icon:"⚖️",
                headline:"Du söker bästa totala köpvärde",
                desc:"Alla mått vägs lika. Identifierar bolag som kombinerar rimlig värdering (PEG), stark analytikerkonsensus och god fundamental kvalitet.",
                ignores:null,
                weights:{ peg:1, upside:1, scoreDeviation:1, buyPct:1, roe:1, grossMargin:1, revenueGrowth:1, rsi:1, beta:0 },
            },
            riskreward: {
                label:"Bäst risk/reward", icon:"🎯",
                headline:"Du söker bäst möjlig avkastning för risken",
                desc:"Uppsida, tillväxt och konsensus väger tyngst. RSI används för att hitta bra teknisk ingångspunkt.",
                ignores:null,
                weights:{ peg:1, upside:3, scoreDeviation:2, buyPct:2, roe:1, grossMargin:1, revenueGrowth:2, rsi:2, beta:1 },
            },
        };

        const FAQ_ITEMS = [
            { q:"Hur rankas varje bolag?", a:"Varje bolag tilldelas en placering 1–7 per parameter (1 = bäst i klassen). Placeringen multipliceras med parameterns vikt för det valda läget och summeras till ett totalvärde. Lägst totalvärde = bäst ranking. Bolagen rankas alltså mot varandra, inte mot ett absolut mål." },
            { q:"Är det olika vikt på olika parametrar?", a:"Ja — vikterna bestäms av det rankingläge du valt. I 'Köpvärde' väger alla parametrar lika (x1). I 'Lägst risk' väger Beta x3 och konsensus/ROE/bruttomarginal x2 var. I 'Bäst risk/reward' väger Uppsida x3, och tillväxt/konsensus x2. Parametrar med vikt 0 ignoreras helt." },
            { q:"Varför viktas vissa parametrar x2 och x3 när jag byter filter?", a:"Varje filter representerar en investeringsstrategi med olika prioriteringar. En riskfokuserad investerare bryr sig mer om stabilitet (beta, konsensus) än om uppsida. En tillväxtinriktad investerare prioriterar tvärtom. Höga vikter förstärker de parametrar som är mest avgörande för just den strategin." },
            { q:"Vad menas med PEG?", a:"PEG = P/E delat med EPS-tillväxt i procent. P/E säger hur mycket du betalar per vinstkrona, men ignorerar hur snabbt vinsten växer. PEG löser det — ett bolag med P/E 50 och 50% vinsttillväxt har PEG 1.0 (rimligt värderat). Under 1.0 anses potentiellt undervärderat. NVDA med PEG ~1.5 är 'billigare' än vad P/E 56 antyder." },
            { q:"Vad menas med Uppsida?", a:"Analytikernas genomsnittliga riktkurs minus dagens kurs, uttryckt i procent. +30% innebär att analytikerkollektivet tror aktien stiger 30% det kommande året. Viktigt: analytiker tenderar att vara systematiskt optimistiska, så reell uppsida är ofta lägre." },
            { q:"Vad är Konsensus-avvikelse?", a:"Analytikernas rekommendationer omvandlas till poäng: Köp=5, Behåll=3, Sälj=1. Vi beräknar viktat genomsnitt och visar avvikelsen från maxpoäng (5.0 = alla säger köp). 0.00 = total enighet om köp. Lägre avvikelse = starkare konsensus." },
            { q:"Vad är RSI och hur beräknas den?", a:"RSI (Relative Strength Index) mäter momentum. Över 70 = aktien kan vara överköpt. Under 30 = översåld. Närmast 50 = neutralt momentum. RSI beräknas från 30 dagars stängningskurser via Yahoo Finance med Wilders utjämningsmetod (14 perioder). En RSI nära 50 ger bäst ranking." },
            { q:"Vad är Beta?", a:"Beta mäter hur mycket en aktie rör sig relativt marknaden (S&P 500). Beta 1.0 = rör sig i takt med index. Tesla på 2.31 = svänger mer än dubbelt så mycket — uppåt och nedåt. Microsoft på 0.90 är stabilare än marknaden." },
            { q:"Varför visas P/E men ingår inte i rankningen?", a:"P/E är välkänt men missvisande för tillväxtbolag — NVDA på P/E 56 ser dyrt ut tills du vet att vinsten växer 100%+. PEG tar hänsyn till tillväxttakten och ger en rättvisare bild. P/E visas som referens för de som är vana vid måttet." },
            { q:"Vad är ROE och varför är det viktigt?", a:"Return on Equity visar hur effektivt bolaget skapar vinst på ägarnas kapital. Warren Buffett söker konsekvent ROE över 15% som tecken på ett genuint kvalitetsbolag. Apples ROE på 160%+ beror delvis på massiva aktieåterköp som krymper eget kapital — men det ändrar inte att bolaget är extremt lönsamt." },
            { q:"Hur ofta uppdateras datan?", a:"Kurser och RSI uppdateras var 15:e minut under marknadstid (måndag–fredag, ca 15:00–23:00 svensk tid). PEG, ROE, marginaler, tillväxt, analytikerkonsensus och riktkurser uppdateras en gång per timme automatiskt via FMP och Yahoo Finance." },
        ];

        function enrich(stocks) {
            return stocks.map(s => {
                const buy    = s.buy   || 0;
                const hold   = s.hold  || 0;
                const sell   = s.sell  || 0;
                const target = s.target;
                const total  = (buy + hold + sell) || 1;
                const buyPct  = Math.round((buy  / total) * 100);
                const holdPct = Math.round((hold / total) * 100);
                const sellPct = 100 - buyPct - holdPct;
                const upside  = target && s.price ? ((target - s.price) / s.price) * 100 : null;
                const score   = (buy * 5 + hold * 3 + sell * 1) / total;
                const scoreDeviation = parseFloat((5 - score).toFixed(2));
                return { ...s, total, buyPct, holdPct, sellPct, upside, score, scoreDeviation, target };
            });
        }

        function rankArr(rows, key, asc) {
            const sorted = [...rows].sort((a, b) => {
                const av = a[key] != null ? a[key] : (asc ? 99999 : -99999);
                const bv = b[key] != null ? b[key] : (asc ? 99999 : -99999);
                return asc ? av - bv : bv - av;
            });
            return Object.fromEntries(sorted.map((r, i) => [r.ticker, i + 1]));
        }

        function addRanks(rows, mode) {
            const w    = MODES[mode].weights;
            const rPEG = rankArr(rows, "peg",           true);
            const rUp  = rankArr(rows, "upside",         false);
            const rSc  = rankArr(rows, "scoreDeviation", true);
            const rBuy = rankArr(rows, "buyPct",         false);
            const rROE = rankArr(rows, "roe",            false);
            const rGM  = rankArr(rows, "grossMargin",    false);
            const rRG  = rankArr(rows, "revenueGrowth",  false);
            const rBeta= rankArr(rows, "beta",           true);
            const rsiS = [...rows].sort((a, b) => Math.abs(a.rsi - 50) - Math.abs(b.rsi - 50));
            const rRSI = Object.fromEntries(rsiS.map((r, i) => [r.ticker, i + 1]));
            return rows.map(r => {
                const ind = {
                    rankPEG:rPEG[r.ticker], rankUpside:rUp[r.ticker], rankScore:rSc[r.ticker],
                    rankBuyPct:rBuy[r.ticker], rankROE:rROE[r.ticker], rankGM:rGM[r.ticker],
                    rankRG:rRG[r.ticker], rankRSI:rRSI[r.ticker], rankBeta:rBeta[r.ticker],
                };
                const total = parseFloat((
                    (w.peg           ? ind.rankPEG    * w.peg           : 0) +
                    (w.upside        ? ind.rankUpside * w.upside        : 0) +
                    (w.scoreDeviation? r.scoreDeviation*w.scoreDeviation: 0) +
                    (w.buyPct        ? ind.rankBuyPct * w.buyPct        : 0) +
                    (w.roe           ? ind.rankROE    * w.roe           : 0) +
                    (w.grossMargin   ? ind.rankGM     * w.grossMargin   : 0) +
                    (w.revenueGrowth ? ind.rankRG     * w.revenueGrowth : 0) +
                    (w.rsi           ? ind.rankRSI    * w.rsi           : 0) +
                    (w.beta          ? ind.rankBeta   * w.beta          : 0)
                ).toFixed(1));
                return { ...r, ...ind, totalRank: total };
            });
        }

        function formatTime(iso) {
            if (!iso) return null;
            try { return new Date(iso).toLocaleTimeString("sv-SE", { hour:"2-digit", minute:"2-digit" }); }
            catch { return null; }
        }

        function Tooltip({ info, children }) {
            const [pos, setPos] = useState(null);
            const ref = useRef();
            const show = () => {
                const r = ref.current.getBoundingClientRect();
                setPos({ x: r.left + r.width / 2, y: r.top });
            };
            return (
                <span style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
                    {children}
                    <span ref={ref} onMouseEnter={show} onMouseLeave={() => setPos(null)}
                        onClick={e => e.stopPropagation()}
                        style={{
                            width:16, height:16, borderRadius:"50%",
                            background: pos ? "rgba(0,163,224,0.3)" : "var(--q-bg)",
                            border: "1px solid " + (pos ? "rgba(0,163,224,0.7)" : "var(--q-border)"),
                            display:"inline-flex", alignItems:"center", justifyContent:"center",
                            fontFamily:"monospace", fontSize:10, fontWeight:700,
                            color: pos ? "var(--accent)" : "var(--q-color)",
                            cursor:"help", transition:"all 0.15s", flexShrink:0,
                        }}>?</span>
                    {pos && ReactDOM.createPortal(
                        <div style={{ position:"fixed", left:pos.x, top:pos.y - 10, transform:"translate(-50%,-100%)", zIndex:9999, width:260, background:"var(--tooltip-bg)", border:"1px solid var(--tooltip-border)", borderRadius:12, padding:"14px 16px", boxShadow:"0 12px 40px var(--shadow)", pointerEvents:"none" }}>
                            <div style={{ fontFamily:"'Sora',sans-serif", fontSize:12, fontWeight:700, color:"var(--text)", marginBottom:4 }}>{info.label}</div>
                            <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--accent)", marginBottom:8, letterSpacing:"0.02em" }}>{info.short}</div>
                            <div style={{ fontFamily:"sans-serif", fontSize:11.5, color:"var(--tooltip-text)", lineHeight:1.65 }}>{info.long}</div>
                        </div>,
                        document.body
                    )}
                </span>
            );
        }

        function RankBadge({ r }) {
            const theme = useContext(ThemeCtx);
            const rc = C[theme].rank(r);
            return <span style={{ display:"inline-block", minWidth:22, height:22, lineHeight:"22px", textAlign:"center", borderRadius:4, background:`${rc}22`, color:rc, fontFamily:"monospace", fontSize:12, fontWeight:700, flexShrink:0 }}>{r}</span>;
        }

        function AnalystBar({ buyPct, holdPct, sellPct }) {
            const theme = useContext(ThemeCtx);
            const cl = C[theme];
            return (
                <div style={{ display:"flex", flexDirection:"column", gap:4, minWidth:100 }}>
                    <div style={{ display:"flex", height:5, borderRadius:3, overflow:"hidden", gap:1 }}>
                        <div style={{ width:`${buyPct}%`, background:cl.buy }} />
                        <div style={{ width:`${holdPct}%`, background:cl.hold }} />
                        <div style={{ width:`${sellPct}%`, background:cl.sell }} />
                    </div>
                    <div style={{ display:"flex", gap:6, fontFamily:"monospace", fontSize:10 }}>
                        <span style={{ color:cl.buy }}>{buyPct}% köp</span>
                        <span style={{ color:cl.hold }}>{holdPct}% behåll</span>
                        <span style={{ color:cl.sell }}>{sellPct}% sälj</span>
                    </div>
                </div>
            );
        }

        function FAQItem({ q, a }) {
            const [open, setOpen] = useState(false);
            return (
                <div style={{ borderBottom:"1px solid var(--border-sm)" }}>
                    <button onClick={() => setOpen(o => !o)} style={{ width:"100%", textAlign:"left", background:"none", border:"none", cursor:"pointer", padding:"14px 0", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16 }}>
                        <span style={{ fontFamily:"'Sora',sans-serif", fontSize:13, fontWeight:600, color: open ? "var(--accent)" : "var(--text)", transition:"color 0.2s" }}>{q}</span>
                        <span style={{ fontFamily:"monospace", fontSize:16, color: open ? "var(--accent)" : "var(--faint)", flexShrink:0, transition:"all 0.2s", transform: open ? "rotate(45deg)" : "none" }}>+</span>
                    </button>
                    {open && <div style={{ fontFamily:"sans-serif", fontSize:13, color:"var(--muted)", lineHeight:1.7, paddingBottom:16, paddingRight:32 }}>{a}</div>}
                </div>
            );
        }

        function Mag7Table() {
            const [theme,   setTheme]   = useState(initTheme);
            const [data,    setData]    = useState(null);
            const [status,  setStatus]  = useState("Laddar data...");
            const [mode,    setMode]    = useState("value");
            const [sortCol, setSortCol] = useState("totalRank");
            const [sortDir, setSortDir] = useState(1);
            const [hovered, setHovered] = useState(null);

            useEffect(() => {
                document.documentElement.dataset.theme = theme;
                localStorage.setItem("mag7-theme", theme);
                applyAccent(SESSION_ACCENT);
            }, [theme]);

            useEffect(() => {
                const bust = Math.floor(Date.now() / (15 * 60 * 1000));
                fetch(`https://oliveprojects.github.io/mag7/data/mag7.json?v=${bust}`)
                    .then(r => r.json())
                    .then(json => {
                        setData(json);
                        const t = formatTime(json.lastYahooUpdate);
                        setStatus(t ? `Uppdaterad ${t}` : "Data laddad");
                    })
                    .catch(() => setStatus("Kunde inte ladda data"));
            }, []);

            if (!data) return (
                <ThemeCtx.Provider value={theme}>
                    <button className="theme-toggle" onClick={() => setTheme(t => t==="dark"?"light":"dark")}>{theme==="dark"?"☀":"🌙"}</button>
                    <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <div style={{ fontFamily:"monospace", fontSize:13, color:"var(--faint)" }}>{status}</div>
                    </div>
                </ThemeCtx.Provider>
            );

            const cl          = C[theme];
            const enriched    = enrich(data.stocks);
            const ranked      = addRanks(enriched, mode);
            const w           = MODES[mode].weights;
            const rankOrder   = [...ranked].sort((a, b) => a.totalRank - b.totalRank);
            const positionMap = Object.fromEntries(rankOrder.map((r, i) => [r.ticker, i + 1]));
            const sorted      = [...ranked].sort((a, b) => sortDir * ((a[sortCol] ?? 9999) - (b[sortCol] ?? 9999)));

            const analystDate = data.lastAnalystUpdate
                ? new Date(data.lastAnalystUpdate).toLocaleDateString("sv-SE", { day:"numeric", month:"short", year:"numeric" })
                : "–";

            const COL_INFO = {
                peg:           { label:"PEG – Pris/Tillväxt",          short:"P/E justerat för vinsttillväxt",                long:"PEG = P/E delat med EPS-tillväxt. PEG 1.0 = rimligt värderad, under 1.0 = potentiellt undervärderad. Löser P/E's problem med tillväxtbolag – NVDA med PEG 1.5 är billigare än vad P/E 56 antyder." },
                upside:        { label:"Uppsida",                       short:"Riktkurs vs live-kurs (timvis)",                long:`Beräknas som (riktkurs − live-kurs) / live-kurs. Live-kursen uppdateras var 15:e minut. Riktkursen är analytikerkonsensus från Yahoo Finance och uppdateras automatiskt (senast ${analystDate}). Uppsidan rör sig alltså med både kursen och uppdaterade riktkurser.` },
                scoreDeviation:{ label:"Konsensus-avvikelse",           short:`Analytikerkonsensus (${analystDate})`,          long:`Analytikernas rekommendationer (köp/behåll/sälj) viktas till 1–5 (5=alla säger köp) och avvikelsen från max visas. 0.00 = total enighet om köp. Lägre = starkare konsensus. Uppdateras automatiskt via Yahoo Finance (senast ${analystDate}).` },
                buyPct:        { label:"Köp%",                          short:`Andel analytiker som säger köp (${analystDate})`, long:`Hur stor andel av analytikerna som aktivt rekommenderar köp. Data hämtas automatiskt från Yahoo Finance (senast ${analystDate}).` },
                roe:           { label:"ROE – Avkastning på kapital",   short:"Buffetts kvalitetsmått",                        long:"Return on Equity visar hur effektivt bolaget skapar vinst med ägarnas pengar. Warren Buffett söker konsekvent ROE över 15%." },
                grossMargin:   { label:"Bruttomarginal",                short:"Mungers pricing power-mått",                    long:"Andelen av intäkterna som blir kvar efter direkta kostnader. Hög marginal = stark marknadsposition. Meta 81% vs Tesla 18% är en enorm skillnad." },
                revenueGrowth: { label:"Omsättningstillväxt",           short:"Intäktstillväxt senaste räkenskapsåret",         long:"Hur snabbt bolaget växer sin omsättning. Tillväxt driver framtida vinster och motiverar höga P/E-tal. NVDA:s 120%+ visar varför PEG är ett bättre mått än P/E för tillväxtbolag." },
                rsi:           { label:"RSI – Relativ styrka",          short:"Teknisk ingångssignal (beräknad live)",          long:"Beräknad från 30 dagars stängningskurser via Wilders metod (14 perioder). Mäter om aktien är överköpt (>70) eller översåld (<30). Närmast 50 = neutralt momentum." },
                beta:          { label:"Beta – Volatilitet",            short:"Hur mycket aktien svänger",                     long:"Beta 1.0 = rör sig i takt med marknaden. Tesla 2.31 = svänger mer än dubbelt så mycket. Under 1.0 = stabilare än index." },
            };

            const handleSort = col => {
                if (sortCol === col) setSortDir(d => -d);
                else { setSortCol(col); setSortDir(1); }
            };

            const thBase  = { padding:"10px 10px", textAlign:"right", cursor:"pointer", whiteSpace:"nowrap", fontFamily:"monospace", fontSize:10, letterSpacing:"0.07em", userSelect:"none", borderBottom:"1px solid var(--border-sm)", transition:"color 0.2s" };
            const thColor = (col, key) => key && w[key]===0 ? "var(--th-dim)" : sortCol===col ? "var(--accent)" : "var(--faint)";
            const arr     = col => sortCol===col ? (sortDir===1?" ↑":" ↓") : "";

            const pillStyle = wv => {
                if (wv === 0)   return cl.pillOff;
                if (wv >= 3)    return cl.pillHi;
                if (wv >= 2)    return cl.pillMid;
                return cl.pillLow;
            };

            const grad = theme === "dark"
                ? "radial-gradient(ellipse 55% 35% at 5% 0%,rgba(0,163,224,0.07) 0%,transparent 70%),radial-gradient(ellipse 40% 55% at 95% 100%,rgba(118,185,0,0.05) 0%,transparent 70%)"
                : "radial-gradient(ellipse 55% 35% at 5% 0%,rgba(0,130,200,0.05) 0%,transparent 70%),radial-gradient(ellipse 40% 55% at 95% 100%,rgba(80,150,0,0.04) 0%,transparent 70%)";

            return (
                <ThemeCtx.Provider value={theme}>
                    <button className="theme-toggle" onClick={() => setTheme(t => t==="dark"?"light":"dark")}>{theme==="dark"?"☀":"🌙"}</button>

                    <div style={{ minHeight:"100vh", background:"var(--bg)", color:"var(--text)", padding:"60px 12px 48px", backgroundImage:grad }}>
                        <style>{`
                            @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap');
                            @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
                            .trow{transition:background 0.12s;}.trow:hover{background:var(--row-hover)!important;}
                            ::-webkit-scrollbar{height:4px;}::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:2px;}
                        `}</style>

                        <div style={{ maxWidth:1440, margin:"0 auto" }}>

                            {/* Header */}
                            <div style={{ marginBottom:24, animation:"fadeUp 0.4s ease both" }}>
                                <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--ghost)", letterSpacing:"0.2em", marginBottom:8 }}>
                                    MAGNIFICENT SEVEN · ANALYST TRACKER{status && status !== "Laddar data..." ? <span style={{ color:"var(--dim)", letterSpacing:"0.1em" }}> · {status}</span> : ""}
                                </div>
                                <h1 style={{ fontFamily:"'Sora',sans-serif", fontSize:"clamp(24px,4vw,38px)", fontWeight:700, letterSpacing:"-0.03em" }}>
                                    Mag<span style={{ color:"var(--accent)" }}>7</span> <span style={{ fontWeight:300, color:"var(--faint)" }}>Index</span>
                                </h1>
                            </div>

                            {/* Mode toggles */}
                            <div style={{ marginBottom:16 }}>
                                <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--faint)", letterSpacing:"0.12em", marginBottom:10 }}>VÄLJ RANKINGLÄGE</div>
                                <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:12 }}>
                                    {Object.entries(MODES).map(([key, m]) => {
                                        const active = mode === key;
                                        return (
                                            <button key={key} onClick={() => { setMode(key); setSortCol("totalRank"); setSortDir(1); }} style={{
                                                padding:"11px 18px", borderRadius:12, cursor:"pointer",
                                                background: active ? "rgba(0,163,224,0.15)" : "var(--btn-bg)",
                                                border:     active ? "1px solid rgba(0,163,224,0.5)" : "1px solid var(--btn-border)",
                                                color:      active ? "var(--accent)" : "var(--dim)",
                                                fontFamily:"'Sora',sans-serif", fontWeight: active ? 700 : 400, fontSize:13, transition:"all 0.2s",
                                            }}>
                                                {m.icon} {m.label}
                                                <div style={{ fontFamily:"monospace", fontSize:9, marginTop:3, opacity:0.6, fontWeight:400 }}>
                                                    {key==="value"?"Balanserad":key==="lowrisk"?"Stabilitet":"Potential"}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                                <div style={{ padding:"12px 16px", background:"var(--mode-box)", borderLeft:"3px solid var(--accent)", borderRadius:"0 8px 8px 0", marginBottom:10 }}>
                                    <div style={{ fontFamily:"'Sora',sans-serif", fontSize:13, fontWeight:600, color:"var(--text)", marginBottom:4 }}>{MODES[mode].headline}</div>
                                    <div style={{ fontFamily:"sans-serif", fontSize:12, color:"var(--muted)", lineHeight:1.5 }}>{MODES[mode].desc}</div>
                                    {MODES[mode].ignores && <div style={{ fontFamily:"monospace", fontSize:10, color:"#ff8a65", marginTop:6 }}>⚠ {MODES[mode].ignores}</div>}
                                </div>
                                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                                    {Object.entries(COL_INFO).map(([k, info]) => {
                                        const wv = w[k] ?? 0;
                                        const ps = pillStyle(wv);
                                        return (
                                            <div key={k} style={{ padding:"3px 10px", borderRadius:20, fontFamily:"monospace", fontSize:10, background:ps.bg, border:`1px solid ${ps.border}`, color:ps.color }}>
                                                {info.label.split("–")[0].trim()} {wv===0?"av":"×"+wv}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Table */}
                            <div style={{ overflowX:"auto", borderRadius:14, border:"1px solid var(--border)" }}>
                                <table style={{ width:"100%", borderCollapse:"collapse", fontFamily:"'Sora',sans-serif" }}>
                                    <thead>
                                        <tr style={{ background:"var(--surface)" }}>
                                            <th style={{ padding:"10px 16px", textAlign:"left", fontFamily:"monospace", fontSize:10, color:"var(--faint)", letterSpacing:"0.08em", borderBottom:"1px solid var(--border-sm)", whiteSpace:"nowrap" }}>BOLAG</th>
                                            <th onClick={() => handleSort("totalRank")} style={{...thBase, color:thColor("totalRank",null)}}>{"RANK"+arr("totalRank")}</th>
                                            <th onClick={() => handleSort("price")} style={{...thBase, color:thColor("price",null)}}>{"KURS"+arr("price")}</th>
                                            <th onClick={() => handleSort("peg")} style={{...thBase, color:thColor("peg","peg")}}><Tooltip info={COL_INFO.peg}><span>{"PEG"+arr("peg")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("upside")} style={{...thBase, color:thColor("upside","upside")}}><Tooltip info={COL_INFO.upside}><span>{"UPPSIDA"+arr("upside")}</span></Tooltip></th>
                                            <th style={{ padding:"10px 10px", textAlign:"left", fontFamily:"monospace", fontSize:10, color:"var(--faint)", borderBottom:"1px solid var(--border-sm)", whiteSpace:"nowrap" }}>ANALYTIKER</th>
                                            <th onClick={() => handleSort("buyPct")} style={{...thBase, color:thColor("buyPct","buyPct")}}><Tooltip info={COL_INFO.buyPct}><span>{"KÖP%"+arr("buyPct")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("scoreDeviation")} style={{...thBase, color:thColor("scoreDeviation","scoreDeviation")}}><Tooltip info={COL_INFO.scoreDeviation}><span>{"KONSENSUS"+arr("scoreDeviation")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("roe")} style={{...thBase, color:thColor("roe","roe")}}><Tooltip info={COL_INFO.roe}><span>{"ROE%"+arr("roe")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("grossMargin")} style={{...thBase, color:thColor("grossMargin","grossMargin")}}><Tooltip info={COL_INFO.grossMargin}><span>{"BRUTTOMARG."+arr("grossMargin")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("revenueGrowth")} style={{...thBase, color:thColor("revenueGrowth","revenueGrowth")}}><Tooltip info={COL_INFO.revenueGrowth}><span>{"REV.TILLVÄXT"+arr("revenueGrowth")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("rsi")} style={{...thBase, color:thColor("rsi","rsi")}}><Tooltip info={COL_INFO.rsi}><span>{"RSI"+arr("rsi")}</span></Tooltip></th>
                                            <th onClick={() => handleSort("beta")} style={{...thBase, color:thColor("beta","beta")}}><Tooltip info={COL_INFO.beta}><span>{"BETA"+arr("beta")}</span></Tooltip></th>
                                            <th style={{...thBase, color:"var(--th-dim)", cursor:"default"}}>P/E</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {sorted.map((r, i) => {
                                            const pos = positionMap[r.ticker];
                                            const tc  = cl.rank(pos);
                                            return (
                                                <tr key={r.ticker} className="trow"
                                                    onMouseEnter={() => setHovered(r.ticker)}
                                                    onMouseLeave={() => setHovered(null)}
                                                    style={{ background: hovered===r.ticker?"var(--row-hover)":i%2===0?"var(--row-alt)":"transparent", borderBottom:"1px solid var(--border-sm)", animation:`fadeUp 0.4s ease ${i*0.05}s both` }}>

                                                    {/* 1. Bolag */}
                                                    <td style={{ padding:"13px 16px", whiteSpace:"nowrap" }}>
                                                        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                                                            <div style={{ width:3, height:30, borderRadius:2, background:ACCENT[r.ticker], flexShrink:0 }} />
                                                            <div>
                                                                <div style={{ fontWeight:600, fontSize:13 }}>{r.name}</div>
                                                                <div style={{ fontFamily:"monospace", fontSize:10, color:ACCENT[r.ticker], letterSpacing:"0.1em", marginTop:1 }}>{r.ticker}</div>
                                                            </div>
                                                        </div>
                                                    </td>

                                                    {/* 2. Totalrank */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap" }}>
                                                        <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", minWidth:46, height:38, borderRadius:8, padding:"0 8px", background:`${tc}18`, border:`1px solid ${tc}44`, fontFamily:"monospace", fontSize:14, fontWeight:700, color:tc }}>
                                                            {r.totalRank.toFixed(1)}
                                                        </div>
                                                    </td>

                                                    {/* 3. Kurs */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap" }}>
                                                        <span style={{ fontFamily:"monospace", fontSize:13, fontWeight:600 }}>${r.price != null ? r.price.toFixed(2) : "–"}</span>
                                                    </td>

                                                    {/* 4. PEG */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.peg===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color: r.peg!=null ? cl.peg(r.peg) : "var(--ghost)" }}>
                                                                {r.peg != null ? r.peg.toFixed(2) : "–"}
                                                            </span>
                                                            <RankBadge r={r.rankPEG} />
                                                        </div>
                                                    </td>

                                                    {/* 5. Uppsida */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.upside===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:r.upside!=null?(r.upside>0?cl.pos:cl.sell):"var(--ghost)" }}>
                                                                {r.upside!=null?(r.upside>0?"+":"")+r.upside.toFixed(1)+"%":"–"}
                                                            </span>
                                                            <RankBadge r={r.rankUpside} />
                                                        </div>
                                                    </td>

                                                    {/* 6. Analytiker */}
                                                    <td style={{ padding:"13px 10px" }}>
                                                        <AnalystBar buyPct={r.buyPct} holdPct={r.holdPct} sellPct={r.sellPct} />
                                                    </td>

                                                    {/* 7. Köp% */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.buyPct===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:cl.buy }}>{r.buyPct}%</span>
                                                            <RankBadge r={r.rankBuyPct} />
                                                        </div>
                                                    </td>

                                                    {/* 8. Konsensus */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.scoreDeviation===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <div style={{ textAlign:"right" }}>
                                                                <div style={{ fontFamily:"monospace", fontSize:13 }}>{r.score.toFixed(2)}</div>
                                                                <div style={{ fontFamily:"monospace", fontSize:10, color:cl.cons(5-r.score) }}>−{r.scoreDeviation.toFixed(2)}</div>
                                                            </div>
                                                            <RankBadge r={r.rankScore} />
                                                        </div>
                                                    </td>

                                                    {/* 9. ROE */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.roe===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13 }}>{r.roe != null ? r.roe.toFixed(1)+"%" : "–"}</span>
                                                            <RankBadge r={r.rankROE} />
                                                        </div>
                                                    </td>

                                                    {/* 10. Bruttomarg */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.grossMargin===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13 }}>{r.grossMargin != null ? r.grossMargin.toFixed(1)+"%" : "–"}</span>
                                                            <RankBadge r={r.rankGM} />
                                                        </div>
                                                    </td>

                                                    {/* 11. Rev.tillväxt */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.revenueGrowth===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:r.revenueGrowth!=null?cl.rev(r.revenueGrowth):"var(--ghost)" }}>
                                                                {r.revenueGrowth!=null?(r.revenueGrowth>0?"+":"")+r.revenueGrowth.toFixed(1)+"%":"–"}
                                                            </span>
                                                            <RankBadge r={r.rankRG} />
                                                        </div>
                                                    </td>

                                                    {/* 12. RSI */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.rsi===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <div style={{ textAlign:"right" }}>
                                                                <div style={{ fontFamily:"monospace", fontSize:13, color:r.rsi!=null?cl.rsi(r.rsi):"var(--ghost)" }}>{r.rsi ?? "–"}</div>
                                                                <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--ghost)" }}>{r.rsi>70?"Överköpt":r.rsi<30?"Översåld":"Neutral"}</div>
                                                            </div>
                                                            <RankBadge r={r.rankRSI} />
                                                        </div>
                                                    </td>

                                                    {/* 13. Beta */}
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.beta===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:cl.beta(r.beta) }}>{r.beta.toFixed(2)}</span>
                                                            <RankBadge r={r.rankBeta} />
                                                        </div>
                                                    </td>

                                                    {/* 14. P/E — referens, alltid dimmad, längst till höger */}
                                                    <td style={{ padding:"13px 16px", textAlign:"right", whiteSpace:"nowrap", opacity:0.35 }}>
                                                        <span style={{ fontFamily:"monospace", fontSize:13 }}>{r.pe != null ? r.pe.toFixed(1) : "–"}</span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>

                            {/* Footer notes */}
                            <div style={{ marginTop:16, display:"flex", flexWrap:"wrap", gap:"6px 20px", fontFamily:"monospace", fontSize:10, color:"var(--muted)" }}>
                                <span>● Data uppdateras var 15:e minut under marknadstid</span>
                                <span>● Rankingbadge: <span style={{color:cl.pos}}>1=bäst</span> → <span style={{color:cl.sell}}>7=sämst</span></span>
                                <span>● Kurser + RSI: Yahoo Finance · PEG, ROE, marginaler, tillväxt: FMP</span>
                                <span>● P/E visas för referens men ingår ej i ranking — PEG används</span>
                                <span>● Analytikerkonsensus, riktkurser och köp/behåll/sälj: Yahoo Finance (automatisk, senast <strong>{analystDate}</strong>)</span>
                                <span>● Uppsida = (riktkurs − live-kurs) / live-kurs — riktkurs uppdateras automatiskt timvis</span>
                            </div>

                            {/* Hint bar — under tabellen */}
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:14, padding:"8px 14px", background:"var(--hint-bg)", border:"1px solid var(--hint-border)", borderRadius:8 }}>
                                <span style={{ fontFamily:"monospace", fontSize:11, color:"var(--text)" }}>Håll muspekaren över <strong>?</strong> bredvid en kolumnrubrik för att se förklaring · Klicka på rubrik för att sortera</span>
                            </div>

                            {/* FAQ */}
                            <div style={{ marginTop:48 }}>
                                <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--dim)", letterSpacing:"0.2em", marginBottom:20 }}>VANLIGA FRÅGOR</div>
                                <div style={{ maxWidth:780, borderTop:"1px solid var(--border-sm)" }}>
                                    {FAQ_ITEMS.map((item, i) => <FAQItem key={i} q={item.q} a={item.a} />)}
                                </div>
                            </div>

                        </div>
                    </div>
                </ThemeCtx.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<Mag7Table />);
    </script>
</body>
</html>
