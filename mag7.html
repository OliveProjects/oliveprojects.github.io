        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --nav-bg:         rgba(11,17,32,0.65);

            --surface:        rgba(255,255,255,0.055);

            --faint:          rgba(255,255,255,0.28);
            --ghost:          rgba(255,255,255,0.20);
            --border:         rgba(255,255,255,0.10);
            --border-sm:      rgba(255,255,255,0.09);
            --row-alt:        rgba(255,255,255,0.025);
            --row-hover:      rgba(255,255,255,0.065);
            --btn-bg:         rgba(255,255,255,0.07);
            --btn-border:     rgba(255,255,255,0.12);
            --accent:         #00a3e0;
            --hint-bg:        rgba(0,163,224,0.08);
            --hint-border:    rgba(0,163,224,0.20);
            --tooltip-bg:     #0f1a30;
            --tooltip-border: rgba(0,163,224,0.30);
            --tooltip-text:   rgba(255,255,255,0.60);
            --shadow:         rgba(0,0,0,0.80);
            --q-bg:           rgba(255,255,255,0.10);
            --q-border:       rgba(255,255,255,0.25);
            --q-color:        rgba(255,255,255,0.60);
            --th-dim:         rgba(255,255,255,0.18);
            --scroll-thumb:   rgba(255,255,255,0.12);
            --mode-box:       rgba(255,255,255,0.05);
        }

        [data-theme="light"] {
            --nav-bg:         rgba(240,242,248,0.65);
            --bg:             #f0f2f8;
            --surface:        rgba(0,0,0,0.03);
            --text:           #111318;
            --muted:          rgba(0,0,0,0.60);
            --dim:            rgba(0,0,0,0.48);
            --faint:          rgba(0,0,0,0.38);
            --ghost:          rgba(0,0,0,0.26);
            --border:         rgba(0,0,0,0.10);
            --border-sm:      rgba(0,0,0,0.07);
            --row-alt:        rgba(0,0,0,0.018);
            --row-hover:      rgba(0,0,0,0.04);
            --btn-bg:         rgba(0,0,0,0.04);
            --btn-border:     rgba(0,0,0,0.10);
            --accent:         #0082c8;
            --hint-bg:        rgba(0,130,200,0.07);
            --hint-border:    rgba(0,130,200,0.20);
            --tooltip-bg:     #ffffff;
            --tooltip-border: rgba(0,130,200,0.30);
            --tooltip-text:   rgba(0,0,0,0.60);
            --shadow:         rgba(0,0,0,0.12);
            --q-bg:           rgba(0,0,0,0.07);
            --q-border:       rgba(0,0,0,0.18);
            --q-color:        rgba(0,0,0,0.50);
            --th-dim:         rgba(0,0,0,0.20);
            --scroll-thumb:   rgba(0,0,0,0.15);
            --mode-box:       rgba(0,0,0,0.02);
        }

        body { background: var(--bg); }

        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            z-index: 9998;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            pointer-events: none;
        }

        .back-link {
            position: fixed; top: 18px; left: 20px; z-index: 9999;
            color: var(--dim); text-decoration: none;
            font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: -0.3px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        .theme-toggle {
            position: fixed; top: 16px; right: 20px; z-index: 9999;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 5px 9px; cursor: pointer;
            font-size: 15px; line-height: 1; color: var(--dim);
            transition: all 0.2s;
        }
        .theme-toggle:hover { color: var(--text); border-color: var(--faint); }

        .lang-dropdown-wrap { position: fixed; top: 16px; right: 64px; z-index: 9999; }
        .lang-dropdown-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            border-radius: 8px; padding: 5px 10px; cursor: pointer;
            font-size: 12px; font-family: monospace; color: var(--dim);
            transition: all 0.2s; white-space: nowrap;
        }
        .lang-dropdown-btn:hover { color: var(--text); border-color: var(--faint); }
        .lang-dropdown-btn .arrow { font-size: 9px; opacity: 0.6; transition: transform 0.2s; }
        .lang-dropdown-btn.open .arrow { transform: rotate(180deg); }
        .lang-menu {
            position: absolute; top: calc(100% + 6px); right: 0;
            background: var(--tooltip-bg); border: 1px solid var(--btn-border);
            border-radius: 10px; overflow: hidden; min-width: 140px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: fadeUp 0.15s ease both;
        }
        .lang-option {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px; cursor: pointer;
            font-size: 12px; font-family: monospace; color: var(--dim);
            transition: background 0.15s, color 0.15s;
            border: none; background: none; width: 100%; text-align: left;
        }
        .lang-option:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .lang-option.active { color: var(--text); background: rgba(255,255,255,0.05); }

        .tool-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            display: flex; align-items: center; justify-content: center; gap: 28px;
            z-index: 9999; pointer-events: none;
        }
        .tool-nav a {
            pointer-events: all; color: var(--dim); text-decoration: none;
            font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.1px;
            transition: color 0.2s;
        }
        .tool-nav a:hover { color: var(--text); }
        .tool-nav a.active { color: var(--accent); }

        .scroll-hint {
            display: none; font-family: monospace; font-size: 10px;
            color: var(--dim); align-items: center; justify-content: center;
            gap: 8px; padding: 6px 0 10px; letter-spacing: 0.08em;
        }
        @media (max-width: 700px) {
            .col-hide-mobile { display: none; }
            .scroll-hint { display: flex; }
        }
        @media (max-width: 480px) {
            .topbar { height: 88px; }
            .tool-nav { height: 88px; align-items: flex-end; padding-bottom: 10px; }
            .back-link { top: 14px; }
            .theme-toggle { top: 12px; }
            .lang-dropdown-wrap { top: 12px; }
            .main-wrap { padding-top: 96px !important; }
        }

    </style>
</head>

            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);

            root.style.setProperty("--accent",         hex);

        }

                    { q:"¿Por qué se muestra el P/E pero no se incluye en la clasificación?",    a:"El P/E es conocido pero engañoso para empresas de crecimiento. NVDA en P/E 56 parece caro hasta que sabes que los beneficios crecen un 100 %+. El PEG tiene en cuenta la tasa de crecimiento y da una imagen más justa. El P/E se muestra como referencia para quienes están familiarizados con este indicador." },
                    { q:"¿Qué es el ROE y por qué importa?",                                     a:"El Return on Equity muestra la eficiencia con que una empresa genera beneficios a partir del capital de los accionistas. Warren Buffett busca consistentemente un ROE superior al 15 % como señal de un negocio de alta calidad. El ROE del 160 %+ de Apple se debe en parte a enormes recompras de acciones que reducen el capital, pero eso no cambia que la empresa es extremadamente rentable." },
                    { q:"¿Con qué frecuencia se actualizan los datos?",                          a:"Los precios y el RSI se actualizan cada 15 minutos durante el horario de mercado (lunes–viernes, aproximadamente 9:00–17:00 ET). El PEG, ROE, márgenes, crecimiento, consenso de analistas y objetivos de precio se actualizan una vez por hora automáticamente via FMP y Yahoo Finance." },
                ],
            },
        };

        function enrich(stocks) {
            return stocks.map(s => {
                const buy = s.buy||0, hold = s.hold||0, sell = s.sell||0;
                const total = (buy+hold+sell)||1;
                const buyPct  = Math.round((buy/total)*100);
                const holdPct = Math.round((hold/total)*100);
                const sellPct = 100-buyPct-holdPct;
                const upside  = s.target && s.price ? ((s.target-s.price)/s.price)*100 : null;
                const score   = (buy*5+hold*3+sell*1)/total;
                const scoreDeviation = parseFloat((5-score).toFixed(2));
                return { ...s, total, buyPct, holdPct, sellPct, upside, score, scoreDeviation };
            });
        }

        function rankArr(rows, key, asc) {
            const sorted = [...rows].sort((a,b) => {
                const av = a[key]!=null?a[key]:(asc?99999:-99999);
                const bv = b[key]!=null?b[key]:(asc?99999:-99999);
                return asc?av-bv:bv-av;
            });
            return Object.fromEntries(sorted.map((r,i) => [r.ticker, i+1]));
        }

        function addRanks(rows, mode) {
            const w    = MODE_WEIGHTS[mode];
            const rPEG = rankArr(rows,"peg",true);
            const rUp  = rankArr(rows,"upside",false);
            const rSc  = rankArr(rows,"scoreDeviation",true);
            const rBuy = rankArr(rows,"buyPct",false);
            const rROE = rankArr(rows,"roe",false);
            const rGM  = rankArr(rows,"grossMargin",false);
            const rRG  = rankArr(rows,"revenueGrowth",false);
            const rBeta= rankArr(rows,"beta",true);
            const rsiS = [...rows].sort((a,b) => Math.abs(a.rsi-50)-Math.abs(b.rsi-50));
            const rRSI = Object.fromEntries(rsiS.map((r,i) => [r.ticker,i+1]));
            return rows.map(r => {
                const ind = { rankPEG:rPEG[r.ticker], rankUpside:rUp[r.ticker], rankScore:rSc[r.ticker], rankBuyPct:rBuy[r.ticker], rankROE:rROE[r.ticker], rankGM:rGM[r.ticker], rankRG:rRG[r.ticker], rankRSI:rRSI[r.ticker], rankBeta:rBeta[r.ticker] };
                const total = parseFloat((
                    (w.peg?ind.rankPEG*w.peg:0)+(w.upside?ind.rankUpside*w.upside:0)+
                    (w.scoreDeviation?r.scoreDeviation*w.scoreDeviation:0)+(w.buyPct?ind.rankBuyPct*w.buyPct:0)+
                    (w.roe?ind.rankROE*w.roe:0)+(w.grossMargin?ind.rankGM*w.grossMargin:0)+
                    (w.revenueGrowth?ind.rankRG*w.revenueGrowth:0)+(w.rsi?ind.rankRSI*w.rsi:0)+
                    (w.beta?ind.rankBeta*w.beta:0)
                ).toFixed(1));
                return { ...r, ...ind, totalRank:total };
            });
        }

        function Tooltip({ info, children }) {
            const [pos, setPos] = useState(null);
            const [pinned, setPinned] = useState(false);
            const ref = useRef();
            const show = () => { const r = ref.current.getBoundingClientRect(); setPos({ x:r.left+r.width/2, y:r.top }); };
            const handleClick = e => {
                e.stopPropagation();
                if (pinned) { setPinned(false); setPos(null); }
                else { show(); setPinned(true); }
            };
            useEffect(() => {
                if (!pinned) return;
                const close = e => { if (ref.current && !ref.current.contains(e.target)) { setPinned(false); setPos(null); } };
                document.addEventListener("mousedown", close);
                document.addEventListener("touchstart", close);
                return () => { document.removeEventListener("mousedown", close); document.removeEventListener("touchstart", close); };
            }, [pinned]);
            const active = pos || pinned;
            return (
                <span style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
                    {children}
                    <span ref={ref}
                        onMouseEnter={!pinned ? show : undefined}
                        onMouseLeave={!pinned ? () => setPos(null) : undefined}
                        onClick={handleClick}
                        style={{ width:16, height:16, borderRadius:"50%", background:active?"rgba(0,163,224,0.3)":"var(--q-bg)", border:"1px solid "+(active?"rgba(0,163,224,0.7)":"var(--q-border)"), display:"inline-flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", fontSize:10, fontWeight:700, color:active?"var(--accent)":"var(--q-color)", cursor:"pointer", transition:"all 0.15s", flexShrink:0 }}>?</span>
                    {pos && ReactDOM.createPortal(
                        <div style={{ position:"fixed", left:pos.x, top:pos.y-10, transform:"translate(-50%,-100%)", zIndex:9999, width:260, background:"var(--tooltip-bg)", border:"1px solid var(--tooltip-border)", borderRadius:12, padding:"14px 16px", boxShadow:"0 12px 40px var(--shadow)", pointerEvents:"none" }}>
                            <div style={{ fontFamily:"'Sora',sans-serif", fontSize:12, fontWeight:700, color:"var(--text)", marginBottom:4 }}>{info.label}</div>

                        </div>, document.body
                    )}
                </span>
            );
        }

                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.peg===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:r.peg!=null?cl.peg(r.peg):"var(--ghost)" }}>{r.peg!=null?r.peg.toFixed(2):"–"}</span>
                                                            <RankBadge r={r.rankPEG} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.upside===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:r.upside!=null?(r.upside>0?cl.pos:cl.sell):"var(--ghost)" }}>{r.upside!=null?(r.upside>0?"+":"")+r.upside.toFixed(1)+"%":"–"}</span>
                                                            <RankBadge r={r.rankUpside} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px" }}><AnalystBar buyPct={r.buyPct} holdPct={r.holdPct} sellPct={r.sellPct} /></td>
                                                    <td className="col-hide-mobile" style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.buyPct===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:cl.buy }}>{r.buyPct}%</span>
                                                            <RankBadge r={r.rankBuyPct} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.scoreDeviation===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <div style={{ textAlign:"right" }}>
                                                                <div style={{ fontFamily:"monospace", fontSize:13 }}>{r.score.toFixed(2)}</div>
                                                                <div style={{ fontFamily:"monospace", fontSize:10, color:cl.cons(5-r.score) }}>−{r.scoreDeviation.toFixed(2)}</div>
                                                            </div>
                                                            <RankBadge r={r.rankScore} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.roe===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13 }}>{r.roe!=null?r.roe.toFixed(1)+"%":"–"}</span>
                                                            <RankBadge r={r.rankROE} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.grossMargin===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13 }}>{r.grossMargin!=null?r.grossMargin.toFixed(1)+"%":"–"}</span>
                                                            <RankBadge r={r.rankGM} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.revenueGrowth===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:r.revenueGrowth!=null?cl.rev(r.revenueGrowth):"var(--ghost)" }}>{r.revenueGrowth!=null?(r.revenueGrowth>0?"+":"")+r.revenueGrowth.toFixed(1)+"%":"–"}</span>
                                                            <RankBadge r={r.rankRG} />
                                                        </div>
                                                    </td>
                                                    <td style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.rsi===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <div style={{ textAlign:"right" }}>
                                                                <div style={{ fontFamily:"monospace", fontSize:13, color:r.rsi!=null?cl.rsi(r.rsi):"var(--ghost)" }}>{r.rsi??"–"}</div>
                                                                <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--ghost)" }}>{r.rsi>70?T.rsi_overbought:r.rsi<30?T.rsi_oversold:T.rsi_neutral}</div>
                                                            </div>
                                                            <RankBadge r={r.rankRSI} />
                                                        </div>
                                                    </td>
                                                    <td className="col-hide-mobile" style={{ padding:"13px 10px", textAlign:"right", whiteSpace:"nowrap", opacity:w.beta===0?0.3:1 }}>
                                                        <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end", gap:6 }}>
                                                            <span style={{ fontFamily:"monospace", fontSize:13, color:cl.beta(r.beta) }}>{r.beta.toFixed(2)}</span>
                                                            <RankBadge r={r.rankBeta} />
                                                        </div>
                                                    </td>
                                                    <td className="col-hide-mobile" style={{ padding:"13px 16px", textAlign:"right", whiteSpace:"nowrap", opacity:0.35 }}>
                                                        <span style={{ fontFamily:"monospace", fontSize:13 }}>{r.pe!=null?r.pe.toFixed(1):"–"}</span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>

                            {/* Footer notes */}
                            <div style={{ marginTop:16, display:"flex", flexWrap:"wrap", gap:"6px 20px", fontFamily:"monospace", fontSize:10, color:"var(--muted)" }}>
                                <span>● {F.note1}</span>
                                <span>● {F.note2_prefix} <span style={{color:cl.pos}}>{F.note2_best}</span> → <span style={{color:cl.sell}}>{F.note2_worst}</span></span>
                                <span>● {F.note3}</span>
                                <span>● {F.note4}</span>
                                <span>● {F.note5_prefix} <strong>{analystDate}</strong>)</span>
                                <span>● {F.note6}</span>
                            </div>

                            {/* Hint */}
                            <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:14, padding:"8px 14px", background:"var(--hint-bg)", border:"1px solid var(--hint-border)", borderRadius:8 }}>
                                <span style={{ fontFamily:"monospace", fontSize:11, color:"var(--text)" }}>{T.hint}</span>
                            </div>

                            {/* FAQ */}
                            <div style={{ marginTop:48 }}>
                                <div style={{ fontFamily:"monospace", fontSize:10, color:"var(--dim)", letterSpacing:"0.2em", marginBottom:20 }}>{T.faq_label}</div>
                                <div style={{ maxWidth:780, borderTop:"1px solid var(--border-sm)" }}>
                                    {T.faq_items.map((item,i) => <FAQItem key={`${lang}-${i}`} q={item.q} a={item.a} />)}
                                </div>
                            </div>

                        </div>
                    </div>
                </LangCtx.Provider></ThemeCtx.Provider>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<Mag7Table />);
    </script>

</body>
</html>
